title = "AlphaNote Gitleaks configuration"

[extend]
useDefault = true

[allowlist]
description = "Synthetic redaction-test fixtures committed before tests built them at runtime."
condition = "AND"
regexTarget = "match"
paths = [
  '''tests/security\.test\.js$''',
]
regexes = [
  '''0123456789abcdef''',
  '''synthetic-test-fixture''',
  '''sk-test-EXAMPLE[0-9]{10}_notreal''',
]
