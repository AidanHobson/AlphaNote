# CI — every push/PR must build the client and pass the test suite, and the
# full git history is scanned for leaked secrets (gitleaks). No secrets are
# needed by CI itself: the build is static and all tests run offline.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo (checkout). No job writes
# anything back, so the GITHUB_TOKEN is read-only.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (tsc, strict)
        run: npm run typecheck
      - name: Build client (Vite)
        run: npm run build
      - name: Run tests (Vitest)
        run: npm test
      # Fail the build on a known high/critical advisory in a *production*
      # dependency (dev-only tooling is excluded to avoid noise that can't ship).
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history — scan every commit, not just the tip
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
