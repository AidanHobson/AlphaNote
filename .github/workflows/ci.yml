# CI — every push/PR must build the client and pass the test suite, and the
# full git history is scanned for leaked secrets (gitleaks). No secrets are
# needed by CI itself: the build is static and all tests run offline.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo (checkout). No job writes
# anything back, so the GITHUB_TOKEN is read-only.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (tsc, strict)
        run: npm run typecheck
      - name: Build client (Vite)
        run: npm run build
      - name: Run tests (Vitest)
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Only the browser the e2e suite uses; --with-deps pulls the OS libs.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # The Playwright config builds the client and boots the prod server itself.
      - name: Run e2e smoke tests (Playwright)
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history — scan every commit, not just the tip
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
